<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings - VroomVroomRides</title>
    <link rel="stylesheet" href="shared.css">
</head>
<body>
    <div class="app">
        <nav class="nav">
            <div class="nav-inner">
                <a href="home.html" class="logo">🏁 VroomVroomRides <span class="logo-dot"></span></a>
                <div class="nav-links">
                    <a href="home.html" class="nav-btn">Home</a>
                    <a href="browse.html" class="nav-btn">Browse</a>
                    <a href="bookings.html" class="nav-btn active">My Bookings</a>
                    <a href="about.html" class="nav-btn">About</a>
                    <a href="admin.html" class="nav-btn" id="nav-admin" style="display:none;">Admin</a>
                    <a href="#" class="nav-btn accent" id="nav-auth" onclick="handleAuthClick(event)">Logout</a>
                    <div class="nav-user" id="nav-user-info">
                        <span id="current-user">User</span>
                        <div class="avatar" id="user-avatar">U</div>
                    </div>
                </div>
            </div>
        </nav>

        <main class="main">
            <div class="page-title">My Bookings</div>
            <div class="page-sub">View and manage your car reservations</div>
            <div class="bookings-list" id="bookings-list"></div>
        </main>
    </div>

    <div class="toast-container" id="toast-container"></div>
    <script src="app.js"></script>
    <script>
        if (!app.currentUser) window.location.href = 'login.html';

        function renderBookings() {
            const userBookings = app.allBookings.filter(b => b.userId === app.currentUser.id);
            const container = document.getElementById('bookings-list');

            if (userBookings.length === 0) {
                container.innerHTML = `
                    <div class="no-bookings">
                        <div class="no-bookings-icon">🚗</div>
                        <h3>No bookings yet</h3>
                        <p>Start by browsing and booking a car</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = userBookings.map(booking => `
                <div class="booking-item">
                    <div class="booking-emoji">${booking.carImage}</div>
                    <div class="booking-info">
                        <div class="booking-name">${booking.carName}</div>
                        <div class="booking-dates">${booking.pickupDate} to ${booking.returnDate}</div>
                        <div class="booking-tags">
                            <span class="tag">${booking.withDriver ? 'With Driver' : 'Self Drive'}</span>
                            <span class="tag">${booking.status}</span>
                            <span class="tag">${booking.paymentStatus || 'Pending'}</span>
                        </div>
                    </div>
                    <div class="booking-total">₹${booking.total}</div>
                    <div style="display: flex; gap: 8px; white-space: nowrap;">
                        <button class="action-btn" onclick="payBooking(${booking.id})" style="background: var(--success); color: #000;">Pay</button>
                        <button class="action-btn danger" onclick="cancelBooking(${booking.id})">Cancel</button>
                    </div>
                </div>
            `).join('');
        }

        function payBooking(bookingId) {
            const booking = app.allBookings.find(b => b.id === bookingId);
            if (booking) {
                booking.paymentStatus = 'Paid';
                app.saveData();
                renderBookings();
                app.showToast(`Payment of ₹${booking.total} completed successfully!`, 'success');
            }
        }

        function cancelBooking(bookingId) {
            if (confirm('Are you sure you want to cancel this booking?')) {
                app.allBookings = app.allBookings.filter(b => b.id !== bookingId);
                app.saveData();
                renderBookings();
                app.showToast('Booking cancelled successfully', 'success');
            }
        }

        function handleAuthClick(e) {
            e.preventDefault();
            app.handleLogout();
        }

        document.getElementById('current-user').textContent = app.currentUser.name;
        document.getElementById('user-avatar').textContent = app.currentUser.name.charAt(0);
        if (app.currentUser.isAdmin) document.getElementById('nav-admin').style.display = 'inline-block';
        renderBookings();
    </script>
</body>
</html>
